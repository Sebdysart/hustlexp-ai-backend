name: Holodeck - Ephemeral Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_call:
    outputs:
      ephemeral_url:
        description: "URL of the ephemeral environment"
        value: ${{ jobs.deploy-ephemeral.outputs.ephemeral_url }}

jobs:
  deploy-ephemeral:
    name: Deploy PR Environment
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    outputs:
      ephemeral_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run compile

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Create & Deploy Ephemeral Environment
        id: deploy
        run: |
          ENV_NAME="pr-${{ github.event.pull_request.number }}"
          railway environment create "$ENV_NAME" 2>/dev/null || echo "Environment may already exist"
          railway up --environment "$ENV_NAME" --detach
          # Get the deployment URL
          URL="https://${ENV_NAME}.hustlexp-ai-backend.up.railway.app"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for Deployment
        run: sleep 45

      - name: Health Check
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Post Environment URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Holodeck Environment\n\nEphemeral backend deployed: ${{ steps.deploy.outputs.url }}\n\nHealth: \`/health\` endpoint active`
            });

  generate-type-manifest:
    name: Generate API Type Manifest
    runs-on: ubuntu-latest
    needs: deploy-ephemeral
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Generate tRPC Type Manifest
        run: npx tsx scripts/generate-type-manifest.ts > type-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: type-manifest
          path: type-manifest.json

  generate-cross-surface-manifests:
    name: Generate Cross-Surface Manifests
    runs-on: ubuntu-latest
    needs: deploy-ephemeral
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Generate Error Code Manifest
        run: npx tsx scripts/generate-error-manifest.ts > error-manifest.json
      - name: Generate Flag Manifest
        run: npx tsx scripts/generate-flag-manifest.ts > flag-manifest.json
      - name: Generate State Machine Manifest
        run: npx tsx scripts/check-state-machine-consistency.ts > state-machine-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: cross-surface-manifests
          path: |
            error-manifest.json
            flag-manifest.json
            state-machine-manifest.json

  notify-ios:
    name: Notify iOS Repo
    runs-on: ubuntu-latest
    needs: [deploy-ephemeral, generate-type-manifest, generate-cross-surface-manifests]
    if: github.event.action != 'closed'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cross-surface-manifests
          path: manifests/
      - name: Dispatch to iOS repo with manifests
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: sebastiandysart/HUSTLEXPFINAL1
          event-type: backend-pr-ready
          client-payload: >-
            {"pr_number": "${{ github.event.pull_request.number }}", "ephemeral_url": "${{ needs.deploy-ephemeral.outputs.ephemeral_url }}", "backend_sha": "${{ github.sha }}", "run_id": "${{ github.run_id }}", "has_manifests": true}
        continue-on-error: true

  cleanup:
    name: Cleanup Ephemeral Environment
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Delete Environment
        run: |
          railway environment delete "pr-${{ github.event.pull_request.number }}" --yes 2>/dev/null || echo "Environment already deleted"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
