# Deploy to Railway — runs only after CI succeeds on main (no duplicate test runs).
name: Deploy

on:
  workflow_run:
    workflows: ["CI — Lint, Typecheck, Test"]
    types: [completed]
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to Railway (staging)
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout commit that passed CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to staging
        run: railway deploy --service=${{ secrets.RAILWAY_SERVICE }} --environment=staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check (staging)
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS --connect-timeout 5 "${{ secrets.STAGING_URL }}/health" && exit 0
            sleep 10
          done
          echo "Health check failed"
          exit 1

  deploy-production:
    name: Deploy to Railway (production)
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production
    steps:
      - name: Checkout commit that passed CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to production
        run: railway deploy --service=${{ secrets.RAILWAY_SERVICE }} --environment=production
        env:
          RAILWAY_TOKEN: ${{ secrets.PRODUCTION_RAILWAY_TOKEN }}

      - name: Health check (production)
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS --connect-timeout 5 "${{ secrets.PRODUCTION_URL }}/health" && exit 0
            sleep 10
          done
          echo "Health check failed"
          exit 1
