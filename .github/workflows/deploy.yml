# Deploy to Railway — MANUAL ONLY (workflow_dispatch).
# Auto-deploy-on-CI-success was intentionally disabled for the pre-launch phase
# so no unattended deploy can happen on merge. A human triggers this via
# "Run workflow" only after the launch gates pass (launch DB created + db:validate
# + liveness/readiness smoke green). To restore auto-deploy at launch, swap the
# trigger back to the workflow_run block (kept in git history) and revert the
# job `if:`/`ref:` lines below.
name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy to Railway (staging)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout the dispatched commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to staging
        run: railway deploy --service=${{ secrets.RAILWAY_SERVICE }} --environment=staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check (staging)
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS --connect-timeout 5 "${{ secrets.STAGING_URL }}/health" && exit 0
            sleep 10
          done
          echo "Health check failed"
          exit 1

  deploy-production:
    name: Deploy to Railway (production)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production
    steps:
      - name: Checkout the dispatched commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to production
        run: railway deploy --service=${{ secrets.RAILWAY_SERVICE }} --environment=production
        env:
          RAILWAY_TOKEN: ${{ secrets.PRODUCTION_RAILWAY_TOKEN }}

      - name: Health check (production)
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS --connect-timeout 5 "${{ secrets.PRODUCTION_URL }}/health" && exit 0
            sleep 10
          done
          echo "Health check failed"
          exit 1
