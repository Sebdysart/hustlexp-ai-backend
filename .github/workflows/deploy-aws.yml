name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hustlexp-api
  ECS_CLUSTER: hustlexp-api-cluster-primary
  ECS_SERVICE: hustlexp-api

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/environments/prod
        run: |
          terraform plan -input=false \
            -var="image_uri=${{ steps.build-image.outputs.image }}" \
            -var="firebase_project_id=${{ secrets.FIREBASE_PROJECT_ID }}" \
            -var="database_url_arn=${{ secrets.DATABASE_URL_ARN }}" \
            -var="redis_url_arn=${{ secrets.REDIS_URL_ARN }}" \
            -var="stripe_secret_key_arn=${{ secrets.STRIPE_SECRET_KEY_ARN }}" \
            -var="firebase_private_key_arn=${{ secrets.FIREBASE_PRIVATE_KEY_ARN }}" \
            -var="route53_zone_id=${{ secrets.ROUTE53_ZONE_ID }}"

      - name: Terraform Apply
        working-directory: terraform/environments/prod
        if: github.ref == 'refs/heads/main'
        run: |
          terraform apply -auto-approve -input=false \
            -var="image_uri=${{ steps.build-image.outputs.image }}" \
            -var="firebase_project_id=${{ secrets.FIREBASE_PROJECT_ID }}" \
            -var="database_url_arn=${{ secrets.DATABASE_URL_ARN }}" \
            -var="redis_url_arn=${{ secrets.REDIS_URL_ARN }}" \
            -var="stripe_secret_key_arn=${{ secrets.STRIPE_SECRET_KEY_ARN }}" \
            -var="firebase_private_key_arn=${{ secrets.FIREBASE_PRIVATE_KEY_ARN }}" \
            -var="route53_zone_id=${{ secrets.ROUTE53_ZONE_ID }}"

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE

      - name: Health check
        run: |
          sleep 30
          curl -f https://api.hustlexp.com/health || exit 1
