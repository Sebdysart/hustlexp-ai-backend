name: Orchestrator — Readiness Score

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  issues: write
  actions: read
  contents: write   # required for gh pr merge --squash on auto/* branches

jobs:
  # ─────────────────────────────────────────────────────────
  # Stage 0: Classify PR Changes (runs first)
  # ─────────────────────────────────────────────────────────
  classify:
    name: Classify PR Changes
    runs-on: ubuntu-latest
    outputs:
      pr_tier: ${{ steps.classify.outputs.tier }}
      pr_tier_name: ${{ steps.classify.outputs.tierName }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Classify PR changes
        id: classify
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | tr '\n' ',')
          export CHANGED_FILES
          npx tsx scripts/classify-pr-changes.ts

  # ─────────────────────────────────────────────────────────
  # Stage 1: Knowledge Graph Context (parallel)
  # ─────────────────────────────────────────────────────────
  context:
    name: Knowledge Graph Context
    needs: [classify]
    if: needs.classify.outputs.pr_tier >= 1
    runs-on: ubuntu-latest
    outputs:
      context_passed: ${{ steps.query.outputs.passed }}
      affected_invariants: ${{ steps.query.outputs.affected_invariants }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Query Knowledge Graph for PR context
        id: query
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | tr '\n' ',')
          export CHANGED_FILES
          if npx tsx scripts/query-docs-for-pr.ts 2>/dev/null; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=degraded" >> $GITHUB_OUTPUT
            echo "Knowledge graph query failed — degraded mode"
          fi
          echo "affected_invariants=" >> $GITHUB_OUTPUT
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true
      - name: Analyze PR description intent
        if: always()
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | tr '\n' ',')
          export CHANGED_FILES
          npx tsx scripts/analyze-pr-description.ts > pr-intent-analysis.md 2>/dev/null || echo "PR intent analysis unavailable"
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # Stage 1b: Migration Safety (parallel, only for migration PRs)
  # ─────────────────────────────────────────────────────────
  migration-safety:
    name: Migration Safety Analysis
    needs: [classify]
    if: contains(needs.classify.outputs.pr_tier_name, 'ARCHITECTURAL') || contains(github.event.pull_request.title, 'migration')
    runs-on: ubuntu-latest
    outputs:
      migration_safe: ${{ steps.analyze.outputs.safe }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Check for migration files in PR
        id: check-migrations
        run: |
          MIGRATION_FILES=$(git diff --name-only origin/main...HEAD | grep '^migrations/' || true)
          if [ -z "$MIGRATION_FILES" ]; then
            echo "has_migrations=false" >> $GITHUB_OUTPUT
            echo "No migration files found — skipping safety analysis"
          else
            echo "has_migrations=true" >> $GITHUB_OUTPUT
            echo "Found migration files: $MIGRATION_FILES"
          fi
      - name: Analyze migration safety
        id: analyze
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | tr '\n' ',')
          export CHANGED_FILES
          if npx tsx scripts/analyze-migration-safety.ts; then
            echo "safe=true" >> $GITHUB_OUTPUT
          else
            echo "safe=false" >> $GITHUB_OUTPUT
          fi
      - name: Default safe when no migrations
        if: steps.check-migrations.outputs.has_migrations != 'true'
        run: echo "safe=true" >> $GITHUB_OUTPUT
        id: default
      - name: Generate schema diff
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | tr '\n' ',')
          export CHANGED_FILES
          npx tsx scripts/generate-schema-diff.ts || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: migration-safety-report
          path: migration-safety-*.json
          retention-days: 14

  # ─────────────────────────────────────────────────────────
  # Stage 1c: Greptile AI Review (parallel, codebase-aware)
  # ─────────────────────────────────────────────────────────
  greptile-review:
    name: Greptile AI Review
    needs: [classify]
    if: needs.classify.outputs.pr_tier >= 1
    runs-on: ubuntu-latest
    outputs:
      review_passed: ${{ steps.review.outputs.passed }}
      review_score: ${{ steps.review.outputs.score }}
      critical_count: ${{ steps.review.outputs.critical_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run Greptile AI Review
        id: review
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | tr '\n' ',')
          export CHANGED_FILES
          npx tsx scripts/greptile-pr-review.ts
        env:
          GREPTILE_API_KEY: ${{ secrets.GREPTILE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          REPO_FULL_NAME: ${{ github.repository }}
          GATE_PR_TIER: ${{ needs.classify.outputs.pr_tier }}
        continue-on-error: true
      - name: Post Greptile Review to PR
        if: always() && hashFiles('greptile-review.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: greptile-review
          path: greptile-review.md
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: greptile-review
          path: greptile-review.md
          retention-days: 14

  # ─────────────────────────────────────────────────────────
  # Stage 2: TDAD Gate (parallel)
  # ─────────────────────────────────────────────────────────
  tdad:
    name: TDAD — Tests Accompany Code
    needs: [classify]
    if: needs.classify.outputs.pr_tier >= 1
    runs-on: ubuntu-latest
    outputs:
      tdad_passed: ${{ steps.check.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check test coverage for changed files
        id: check
        run: |
          if bash scripts/check-test-coverage-pr.sh; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────
  # Stage 3: CI Pipeline (reuse ci.yml via workflow_call)
  # ─────────────────────────────────────────────────────────
  ci:
    name: CI Pipeline
    needs: [classify]
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ─────────────────────────────────────────────────────────
  # Stage 4: Invariant Tests (separate check — mandatory gate)
  # ─────────────────────────────────────────────────────────
  invariants:
    name: Constitutional Invariant Tests
    runs-on: ubuntu-latest
    needs: [classify, ci]
    if: needs.classify.outputs.pr_tier >= 1
    outputs:
      invariants_passed: ${{ steps.run.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run Invariant Kill Tests
        id: run
        run: |
          if npx vitest run backend/tests/invariants/ --reporter=verbose 2>&1 | tee invariant-output.txt; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: invariant-output
          path: invariant-output.txt
          retention-days: 14

  # ─────────────────────────────────────────────────────────
  # Stage 5: Holodeck — Ephemeral Deploy (after CI passes)
  # ─────────────────────────────────────────────────────────
  holodeck:
    name: Holodeck Deploy
    needs: [classify, ci]
    if: needs.classify.outputs.pr_tier >= 1
    uses: ./.github/workflows/holodeck.yml
    secrets: inherit

  # ─────────────────────────────────────────────────────────
  # Stage 6: Compute & Post Readiness Score
  # ─────────────────────────────────────────────────────────
  readiness-score:
    name: Readiness Score
    runs-on: ubuntu-latest
    if: always()
    needs: [classify, context, tdad, ci, invariants, holodeck, migration-safety, greptile-review]
    outputs:
      score: ${{ steps.score.outputs.total_score }}
      meets_threshold: ${{ steps.score.outputs.meets_threshold }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci

      - name: Evaluate degradation contracts
        id: degradation
        run: npx tsx scripts/evaluate-degradation.ts
        env:
          GATE_KNOWLEDGE_GRAPH: ${{ needs.context.outputs.context_passed }}
          GATE_TDAD: ${{ needs.tdad.outputs.tdad_passed }}
          GATE_TYPECHECK: ${{ needs.ci.outputs.typecheck_result }}
          GATE_LINT: ${{ needs.ci.outputs.lint_result }}
          GATE_UNIT_TESTS: ${{ needs.ci.outputs.test_result }}
          GATE_INVARIANT_TESTS: ${{ needs.invariants.outputs.invariants_passed }}
          GATE_HOLODECK: ${{ needs.holodeck.result }}

      - name: Compute Readiness Score
        id: score
        run: |
          npx tsx scripts/compute-readiness-score.ts
        env:
          GATE_CONTEXT: ${{ needs.context.outputs.context_passed }}
          GATE_TDAD: ${{ needs.tdad.outputs.tdad_passed }}
          GATE_TYPECHECK: ${{ needs.ci.outputs.typecheck_result }}
          GATE_LINT: ${{ needs.ci.outputs.lint_result }}
          GATE_TESTS: ${{ needs.ci.outputs.test_result }}
          GATE_INVARIANTS: ${{ needs.invariants.outputs.invariants_passed }}
          GATE_HOLODECK: ${{ needs.holodeck.result }}
          GATE_PR_TIER: ${{ needs.classify.outputs.pr_tier }}
          GATE_MIGRATION_SAFETY: ${{ needs.migration-safety.outputs.migration_safe }}
          GATE_DEGRADATION_BLOCKED: ${{ steps.degradation.outputs.overrideBlocked }}
          GATE_GREPTILE: ${{ needs.greptile-review.outputs.review_passed }}
          GATE_GREPTILE_SCORE: ${{ needs.greptile-review.outputs.review_score }}
          GATE_GREPTILE_CRITICAL: ${{ needs.greptile-review.outputs.critical_count }}
          CHANGED_FILES: ${{ steps.degradation.outputs.changed_files }}

      - name: Post Readiness Score to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: readiness-score
          path: readiness-score.md

  # ─────────────────────────────────────────────────────────
  # Stage 7: Autonomous Merge Gate
  # Only fires for auto/* branches when readiness-score exits 0
  # (i.e. score >= MERGE_THRESHOLD and all mandatory gates green)
  # ─────────────────────────────────────────────────────────
  auto-merge:
    name: Autonomous Merge
    runs-on: ubuntu-latest
    needs: [readiness-score]
    if: |
      needs.readiness-score.result == 'success' &&
      startsWith(github.event.pull_request.head.ref, 'auto/')
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto \
            --subject "auto: ${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"

  # ─────────────────────────────────────────────────────────
  # Stage 7: Auto-Merge (only for autonomous branches)
  # ─────────────────────────────────────────────────────────
  auto-merge:
    name: Auto-Merge Gate
    runs-on: ubuntu-latest
    if: >-
      always() &&
      startsWith(github.event.pull_request.head.ref, 'auto/') &&
      needs.readiness-score.outputs.meets_threshold == 'true' &&
      needs.greptile-review.outputs.critical_count == '0' &&
      needs.ci.result == 'success'
    needs: [readiness-score, greptile-review, ci]
    steps:
      - name: Auto-merge autonomous PR
        run: |
          echo "Readiness score meets threshold, Greptile review clean, CI green."
          echo "Auto-merging autonomous PR #${{ github.event.pull_request.number }}..."
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto \
            --subject "auto: $(gh pr view ${{ github.event.pull_request.number }} --json title -q .title)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
