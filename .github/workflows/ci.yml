name: CI — Lint, Typecheck, Test

on:
  push:
    branches: [main, "feat/*", codex/adult-hustler-gate]
  pull_request:
    branches: [main, "feat/*", codex/adult-hustler-gate]
  workflow_call:
    outputs:
      typecheck_result:
        description: "TypeCheck job result"
        value: ${{ jobs.typecheck.result }}
      lint_result:
        description: "Lint job result"
        value: ${{ jobs.lint.result }}
      test_result:
        description: "Test job result"
        value: ${{ jobs.test.result }}
      build_result:
        description: "Build job result"
        value: ${{ jobs.build.result }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  typecheck:
    name: TypeScript — zero errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: "TypeScript — zero errors (backend/src/)"
        run: npx tsc --noEmit

  lint:
    name: "Lint — zero warnings (backend/src/)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: "Lint — zero warnings (backend/src/)"
        run: npx eslint backend/src/ --ext .ts --max-warnings 0

  test:
    name: "Tests — zero failures"
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.TEST_UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.TEST_UPSTASH_REDIS_REST_TOKEN }}
      FIREBASE_PROJECT_ID: test-project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: "Tests — zero failures"
        run: npx vitest run --reporter=verbose
        timeout-minutes: 10
      - name: Production role readiness contract
        run: npm run verify:production-role-readiness:contract

  audit:
    name: "Security audit — no NEW high/critical vulnerabilities"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: "Security audit — fail on NEW high/critical GHSAs"
        # npm 10.x does not support --ignore-ghsa, so we implement a GHSA baseline
        # check in Node.js. The script below extracts all GHSA IDs from `npm audit
        # --json` and fails CI if any advisory is NOT in the known baseline below.
        #
        # KNOWN BASELINE — retriaged 2026-06-11 (production-hardening).
        # `npm audit fix` cleared 57 of 71 distinct advisories (all the
        # fast-xml-parser / hono-core / @trpc/server / tsx items from the prior
        # baseline are RESOLVED). @hono/node-server and ws were bumped to patched
        # versions (1.19.14 / 8.21.0). The 11 below remain because their fixes
        # require breaking major bumps (`--force`); each is documented with its
        # REACHABILITY in THIS codebase — all 11 sit on code paths that are never
        # imported/executed here, so none is exploitable in the running service:
        #
        #   protobufjs (8 advisories, incl. 1 critical RCE GHSA-XQ3M-2V4X-88GG):
        #     transitive via @opentelemetry/* OTLP exporters. UNREACHABLE — there
        #     are ZERO `opentelemetry` imports anywhere in backend/src (the SDK is
        #     declared in package.json but never wired up). The protobuf decode
        #     path that the advisories target is never invoked.
        #     GHSA-XQ3M-2V4X-88GG  critical  protobufjs — arbitrary code execution
        #     GHSA-66FF-XGX4-VCHM  high      protobufjs — code injection via bytes default
        #     GHSA-75PX-5XX7-5XC7  high      protobufjs — codegen gadget after proto pollution
        #     GHSA-JVWF-75H9-CWGG  high      protobufjs — process-wide DoS
        #     GHSA-685M-2W69-288Q  high      protobufjs — unbounded protobuf DoS
        #     GHSA-2PR8-PHX7-X9H3  moderate  protobufjs — crafted field-name DoS
        #     GHSA-FX83-V9X8-X52W  moderate  protobufjs — prototype injection
        #     GHSA-JGGG-4JG4-V7C6  moderate  protobufjs — recursive JSON DoS
        #     GHSA-Q6X5-8V7M-XCRF  moderate  protobufjs — overlong UTF-8 decoding
        #   GHSA-Q7RR-3CGH-J5R3  high     @opentelemetry/auto-instrumentations-node —
        #     Prometheus exporter crash. UNREACHABLE (same: OTEL never imported).
        #   GHSA-W5HQ-G745-H8PQ  moderate uuid — missing buffer bounds check (v3/v5/v6
        #     with a `buf` arg). UNREACHABLE — the `uuid` npm package is never
        #     imported (UUIDs are generated via node's crypto.randomUUID(); the
        #     `uuid` refs in src are SQL `::uuid[]` casts and zod `.uuid()`).
        #     Fix is uuid@14 (4 majors); deferred to a dependency-cleanup pass.
        #
        # SCOPE: this gate audits PRODUCTION dependencies only (`--omit=dev`).
        # Dev tooling (vitest, esbuild, tsx, build scripts) is NOT in the
        # deployed artifact — it never runs in production, never touches user
        # data or money — and its advisory set varies by the runner's npm
        # version (Node 20 vs 22 traversal differs), which made a full-tree
        # by-GHSA-ID baseline perpetually flaky. The production runtime tree is
        # deterministic and contains exactly the 11 unreachable advisories
        # baselined below. (Dev-tooling advisories are still visible via the
        # non-blocking `npm audit` job in security.yml.)
        #
        # FOLLOW-UP (tracked in PRODUCTION_READINESS doc): remove unused
        # OpenTelemetry + uuid deps, or bump OTEL to a protobufjs-8.0.1+ line.
        # To add a NEW known advisory: append its GHSA ID and document it above
        # WITH a reachability assessment (not just severity).
        run: |
          npm audit --omit=dev --json > /tmp/audit.json 2>/dev/null || true
          node - <<'EOF'
          const fs = require('fs');
          const KNOWN_GHSAS = new Set([
            // protobufjs (transitive via OpenTelemetry — never imported in src)
            'GHSA-XQ3M-2V4X-88GG',
            'GHSA-66FF-XGX4-VCHM',
            'GHSA-75PX-5XX7-5XC7',
            'GHSA-JVWF-75H9-CWGG',
            'GHSA-685M-2W69-288Q',
            'GHSA-2PR8-PHX7-X9H3',
            'GHSA-FX83-V9X8-X52W',
            'GHSA-JGGG-4JG4-V7C6',
            'GHSA-Q6X5-8V7M-XCRF',
            // @opentelemetry — never imported in src
            'GHSA-Q7RR-3CGH-J5R3',
            // uuid npm package — never imported (crypto.randomUUID used instead)
            'GHSA-W5HQ-G745-H8PQ',
          ]);
          let data;
          try {
            data = JSON.parse(fs.readFileSync('/tmp/audit.json', 'utf8'));
          } catch (e) {
            console.error('Failed to parse npm audit output:', e.message);
            process.exit(1);
          }
          const found = new Set();
          const vulns = data.vulnerabilities || {};
          for (const [, vuln] of Object.entries(vulns)) {
            if (!Array.isArray(vuln.via)) continue;
            for (const via of vuln.via) {
              if (via && typeof via === 'object' && via.url) {
                const m = via.url.match(/GHSA-[a-zA-Z0-9-]+/i);
                if (m) found.add(m[0].toUpperCase());
              }
            }
          }
          const newGhsas = [...found].filter(g => !KNOWN_GHSAS.has(g));
          console.log(`Known baseline: ${KNOWN_GHSAS.size} GHSAs`);
          console.log(`Found in audit: ${found.size} GHSAs`);
          if (newGhsas.length > 0) {
            console.error('\nFAIL — NEW high/critical GHSAs detected (not in baseline):');
            for (const g of newGhsas) console.error('  ' + g);
            console.error('\nAdd them to KNOWN_GHSAS in ci.yml after triaging.');
            process.exit(1);
          }
          console.log('OK — all found GHSAs are in the known baseline.');
          EOF

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Validate build compiles cleanly
        run: npm run compile
